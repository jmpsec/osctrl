<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2bc4be" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- Bai Jamjuree — the wordmark font from the legacy osctrl admin.
         Preconnect first so the font hits parse-blocking before the
         download starts; display=swap so text renders in the fallback
         while the woff2 is in flight. Only used by .font-wordmark. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>osctrl</title>
    <!-- Theme bootstrap runs blocking from a static asset so `script-src 'self'`
         covers it without a CSP hash to maintain. -->
    <script src="/theme-bootstrap.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
