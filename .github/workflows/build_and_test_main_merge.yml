name: CI - Main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: false

env:
  GOLANG_VERSION: 1.25.4

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Go
        uses: actions/setup-go@8e57b58e57be52ac95949151e2777ffda8501267 # v5.5.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache: true

      - name: Test (retry)
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts=$1
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after $attempts attempts: $*"
                return 1
              fi
              n=$((n + 1))
              sleep $((5 * n))
            done
          }
          retry 3 go test ./...

      - name: GoReleaser snapshot build
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: latest
          args: build --snapshot --clean --single-target

  publish-ghcr:
    name: Publish GHCR images
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: tls
            dockerfile: deploy/cicd/docker/Dockerfile-osctrl-tls
          - component: admin
            dockerfile: deploy/cicd/docker/Dockerfile-osctrl-admin
          - component: api
            dockerfile: deploy/cicd/docker/Dockerfile-osctrl-api
          - component: cli
            dockerfile: deploy/cicd/docker/Dockerfile-osctrl-cli
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e8 # v3.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@af1b253b8dc984466d22633f04ef341c1520ed2f # v3.11.1

      - name: Login to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (retry)
        id: build
        shell: bash
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/osctrl-${{ matrix.component }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -euo pipefail
          retry() {
            local attempts=$1
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after $attempts attempts: $*"
                return 1
              fi
              n=$((n + 1))
              sleep $((5 * n))
            done
          }

          short_sha="${GITHUB_SHA::12}"
          main_tag="${IMAGE}:main"
          sha_tag="${IMAGE}:sha-${short_sha}"

          retry 3 docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file "${DOCKERFILE}" \
            --tag "${main_tag}" \
            --tag "${sha_tag}" \
            --push \
            .

          digest="$(docker buildx imagetools inspect "${main_tag}" | awk '/Digest:/ {print $2; exit}')"
          if [ -z "${digest}" ]; then
            echo "Unable to resolve image digest for ${main_tag}"
            exit 1
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign and verify image digest (keyless)
        shell: bash
        env:
          IMAGE: ${{ steps.build.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          retry() {
            local attempts=$1
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after $attempts attempts: $*"
                return 1
              fi
              n=$((n + 1))
              sleep $((5 * n))
            done
          }

          retry 3 cosign sign --yes "${IMAGE}@${DIGEST}"
          retry 3 cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"
