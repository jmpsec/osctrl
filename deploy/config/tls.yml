# YAML configuration for osctrl-tls

service:
  listener: 127.0.0.1
  port: 9000
  # Valid values: "debug", "info", "warn", "error"
  logLevel: info
  # Valid values: "json", "console"
  logFormat: json
  host: osctrl.net
  # Valid values: "none", "json", "db", "saml", "oidc", "oauth"
  auth: none
  auditLog: true
  # Comma-separated CIDR list whose X-Real-IP / X-Forwarded-For headers
  # utils.GetIP will trust. osctrl-tls is typically internet-facing for
  # osquery node enrollment; keep empty unless you operate it behind a
  # trusted reverse proxy that forwards client IPs. Empty (default)
  # prevents header-spoofed enroll-rate-limit bypass and audit-log
  # poisoning.
  trustedProxies: ""
  # Prefix for scheduled query names whose results are ingested as
  # node posture data (security & compliance). Queries in the osquery
  # schedule named e.g. "osctrl:posture:packages" will have their
  # results stored as the "packages" posture category.
  #
  # Enable the security & compliance posture system. When false
  # (default), no posture data is collected, no posture API endpoints
  # are available, and the posture tab is hidden in the SPA.
  # When true, result logs from posture-prefixed scheduled queries
  # are ingested and stored per node.
  postureEnabled: false
  # Only used when postureEnabled is true.
  postureQueryPrefix: "osctrl:posture:"

# Database configuration
db:
  type: postgres
  host: 127.0.0.1
  port: 5432
  name: osctrl
  username: postgres
  password: postgres
  sslmode: disable
  maxIdleConns: 20
  maxOpenConns: 100
  connMaxLifetime: 30
  connRetry: 10
  filePath: ./osctrl.db

# Batch writer configuration
batchwriter:
  writerBatchSize: 50
  writerTimeout: 1m0s
  writerBufferSize: 2000

# Redis cache configuration
redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  connectionString: ""
  db: 0
  connRetry: 10

# Osquery nodes configuration
osquery:
  version: 5.23.1
  tablesFile: ./data/5.23.1.json
  logger: true
  config: true
  query: true
  carve: true
  accelerated: false

# Osctrl daemon configuration
osctrld:
  enabled: false

# Metrics configuration (Prometheus)
metrics:
  enabled: false
  listener: 127.0.0.1
  port: 9090

# TLS termination configuration
tls:
  termination: false
  certificateFile: ./config/tls.crt
  keyFile: ./config/tls.key

# Logger configuration to handle received logs from osquery nodes
logger:
  # Valid values: "none", "stdout", "file", "db", "graylog", "splunk", "logstash", "kinesis", "s3", "kafka", "elastic"
  type: db
  loggerDBSame: false
  alwaysLog: false
  db:
    type: ""
    host: ""
    port: 0
    name: ""
    username: ""
    password: ""
    sslmode: ""
    maxIdleConns: 0
    maxOpenConns: 0
    connMaxLifetime: 0
    connRetry: 0
    filePath: ""
  s3:
    bucket: ""
    region: ""
    accessKey: ""
    secretAccessKey: ""
  graylog:
    url: ""
    host: ""
    queries: ""
    status: ""
    results: ""
  elastic:
    host: ""
    port: ""
    indexPrefix: ""
    dateSeparator: ""
    indexSeparator: ""
  splunk:
    url: ""
    token: ""
    host: ""
    index: ""
  logstash:
    host: ""
    port: ""
    protocol: ""
    path: ""
  kinesis:
    stream: ""
    region: ""
    endpoint: ""
    accessKey: ""
    secretKey: ""
    sessionToken: ""
  kafka:
    bootstrapServers: ""
    sslCALocation: ""
    connectionTimeout: 5s
    sasl:
      mechanism: ""
      username: ""
      password: ""
    topic: ""
  local:
    filePath: ""
    maxSize: 0
    maxBackups: 0
    maxAge: 0
    compress: false

# Carver configuration to handle file carves from osquery nodes
carver:
  # Valid values: "none", "local", "db", "s3"
  type: db
  s3:
    bucket: ""
    region: ""
    accessKey: ""
    secretAccessKey: ""
  local:
    carvesDir: ./carved_files/

# Debug configuration
debug:
  enableHttp: false
  httpFile: ./debug-http-tls.log
  showBody: false
  # When non-empty, only dump requests from the osquery node whose UUID
  # (or enroll host_identifier) matches this value (case-insensitive).
  # Empty dumps every request when enableHttp is true. Useful to isolate
  # one host's traffic on a busy server.
  hostIdentifier: ""
