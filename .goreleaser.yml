# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

dist: "./dist"

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: osctrl-tls
    main: ./cmd/tls
    binary: "osctrl-tls-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildVersion={{.Version}}
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}

  - id: osctrl-admin
    main: ./cmd/admin
    binary: "osctrl-admin-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildVersion={{.Version}}
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}

  - id: osctrl-api
    main: ./cmd/api
    binary: "osctrl-api-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildVersion={{.Version}}
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}

  - id: osctrl-cli
    main: ./cmd/cli
    binary: "osctrl-cli-{{ .Os }}-{{ .Arch }}"
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.buildVersion={{.Version}}
      - -X main.buildCommit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: osctrl
    allow_different_binary_count: true
    name_template: >-
      {{ .ProjectName }}-
      {{- title .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]
    ids:
      - osctrl-tls
      - osctrl-admin
      - osctrl-api
      - osctrl-cli
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot: {}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

dockers:
  # osctrl-tls — amd64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:{{ .Version }}-amd64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-tls
    use: buildx
    goarch: amd64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files:
      - dist/osctrl-tls-linux-amd64
  # osctrl-tls — arm64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:{{ .Version }}-arm64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-tls
    use: buildx
    goarch: arm64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files:
      - dist/osctrl-tls-linux-arm64

  # osctrl-admin — amd64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:{{ .Version }}-amd64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-admin
    use: buildx
    goarch: amd64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files:
      - dist/osctrl-admin-linux-amd64
      - cmd/admin/templates
      - cmd/admin/static
      - deploy/osquery/data
  # osctrl-admin — arm64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:{{ .Version }}-arm64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-admin
    use: buildx
    goarch: arm64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files:
      - dist/osctrl-admin-linux-arm64
      - cmd/admin/templates
      - cmd/admin/static
      - deploy/osquery/data

  # osctrl-api — amd64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:{{ .Version }}-amd64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-api
    use: buildx
    goarch: amd64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files:
      - dist/osctrl-api-linux-amd64
  # osctrl-api — arm64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:{{ .Version }}-arm64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-api
    use: buildx
    goarch: arm64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files:
      - dist/osctrl-api-linux-arm64

  # osctrl-cli — amd64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:{{ .Version }}-amd64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-cli
    use: buildx
    goarch: amd64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files:
      - dist/osctrl-cli-linux-amd64
  # osctrl-cli — arm64
  - image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:{{ .Version }}-arm64"
    dockerfile: deploy/cicd/docker/Dockerfile-osctrl-cli
    use: buildx
    goarch: arm64
    skip_push: false
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files:
      - dist/osctrl-cli-linux-arm64

# docker_manifests fuses per-arch images into a single multi-arch manifest
# list that `docker pull <image>:<tag>` resolves to the right arch
# automatically. Without this section, the previous `dockers:` blocks were
# trying to write a manifest list directly from a single buildx invocation,
# which the default Docker exporter does not support — that was the
# `docker exporter does not currently support exporting manifest lists`
# error on every tagged release back to v0.4.8.
#
# skip_push gates the manifest combine on snapshot builds: snapshots
# don't push individual per-arch images either, so there'd be nothing
# to combine into a list.
docker_manifests:
  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'
  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:latest"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-tls:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'

  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'
  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:latest"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-admin:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'

  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'
  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:latest"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-api:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'

  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:{{ .Version }}"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'
  - name_template: "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:latest"
    image_templates:
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:{{ .Version }}-amd64"
      - "{{ .Env.DOCKER_HUB_ORG }}/osctrl-cli:{{ .Version }}-arm64"
    skip_push: '{{ .IsSnapshot }}'

docker_signs:
  - artifacts: all
    cmd: cosign
    args:
      - sign
      - "${artifact}@${digest}"
      - --yes

nfpms:
  - id: osctrl-tls
    maintainer: jmpsec/osctrl
    description: osctrl TLS component
    homepage: https://github.com/jmpsec/osctrl
    license: MIT
    formats:
      - deb
    bindir: /opt/osctrl/bin
    contents:
      - src: ./dist/osctrl-tls-{{ .Os }}-{{ .Arch }}
        dst: /opt/osctrl/bin/osctrl-tls
    overrides:
      deb:
        scripts:
          postinstall: deploy/cicd/deb/post-install.sh
          preremove: deploy/cicd/deb/pre-remove.sh

  - id: osctrl-admin
    maintainer: jmpsec/osctrl
    description: osctrl Admin component
    homepage: https://github.com/jmpsec/osctrl
    license: MIT
    formats:
      - deb
    bindir: /opt/osctrl/bin
    contents:
      - src: ./dist/osctrl-admin-{{ .Os }}-{{ .Arch }}
        dst: /opt/osctrl/bin/osctrl-admin
    overrides:
      deb:
        scripts:
          postinstall: deploy/cicd/deb/post-install.sh
          preremove: deploy/cicd/deb/pre-remove.sh

  - id: osctrl-api
    maintainer: jmpsec/osctrl
    description: osctrl API component
    homepage: https://github.com/jmpsec/osctrl
    license: MIT
    formats:
      - deb
    bindir: /opt/osctrl/bin
    contents:
      - src: ./dist/osctrl-api-{{ .Os }}-{{ .Arch }}
        dst: /opt/osctrl/bin/osctrl-api
    overrides:
      deb:
        scripts:
          postinstall: deploy/cicd/deb/post-install.sh
          preremove: deploy/cicd/deb/pre-remove.sh

  - id: osctrl-cli
    maintainer: jmpsec/osctrl
    description: osctrl CLI component
    homepage: https://github.com/jmpsec/osctrl
    license: MIT
    formats:
      - deb
    bindir: /opt/osctrl/bin
    contents:
      - src: ./dist/osctrl-cli-{{ .Os }}-{{ .Arch }}
        dst: /opt/osctrl/bin/osctrl-cli
    overrides:
      deb:
        scripts:
          postinstall: deploy/cicd/deb/post-install.sh
          preremove: deploy/cicd/deb/pre-remove.sh

release:
  draft: false
  prerelease: false
